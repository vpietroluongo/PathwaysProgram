<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Flash Cards CRUD</title>
    <link rel="stylesheet" href="css/site.css" />

   <!-- <link rel="canonical" href="https://getbootstrap.com/docs/5.0/examples/carousel/"> -->

    <!-- Bootstrap core CSS -->
    <!-- <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta3/dist/css/bootstrap.min.css" rel="stylesheet"> -->
</head>
<body>
    <h1>Flash Cards CRUD</h1>
    <h3>Add</h3>
    <form action="javascript:void(0);" method="POST" onsubmit="addItem()">
        <input type="text" id="add-question" placeholder="New question">
        <input type="text" id="add-answer" placeholder="New answer">
        <input type="submit" value="Add">
    </form>

    <div id="editForm">
        <h3>Edit</h3>
        <form action="javascript:void(0);" onsubmit="updateItem()">
            <input type="hidden" id="edit-id">
            <input type="checkbox" id="edit-isComplete">
            <input type="text" id="edit-question">
            <input type="text" id="edit-answer">
            <input type="submit" value="Save">
            <a onclick="closeInput()" aria-label="Close">&#10006;</a>
        </form>
    </div>

    <p id="counter"></p>

    <table>
        <tr>
            <th>Is Correct?</th>
            <th>Question</th>
            <th>Answer</th>
            <th></th>
            <th></th>
        </tr>
        <tbody id="flashcards"></tbody>
    </table>

    <script src="js/site.js" asp-append-version="true"></script>
    <script type="text/javascript">
        getItems();
    </script>
</body>
</html>
